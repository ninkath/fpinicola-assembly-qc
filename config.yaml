# ============================================================================
# config.yaml for Assembly, polishing, QC, and heterozygosity pipeline
# ============================================================================
samples:
  fpindikaryon: "PATH/TO/YOUR/READS/HERE"

filtering:
  reference:
    min_length: 20000
    target_bases: 2500000000

  phasing:
    min_length: 5000
    target_bases: 10000000000
    
assembly:
  genome_size: "45m"
  flye_mode: "--nano-hq"
  threads: 16

polishing:
  racon_rounds: 2
  medaka_model: "r1041_e82_400bps_sup_v4.3.0"

reference_fasta:
  use: "polished"   # or "unpolished"
paths:
  unpolished_ref: "results/assembly/hifiasm/{sample}/assembly.fasta"
  polished_ref: "results/medaka/{sample}/consensus.fasta"

# Clair3 model path in container (adjust if needed)
clair3_model: "/usr/local/bin/models/r1041_e82_400bps_sup_v500"

qc:
  busco_lineage: "polyporales_odb12"
  busco_db_path: "resources/busco_db"
  quast:
    min_contig_standard: 1000
    min_contig_core: 1000000
    
threads:
  medium: 8

containers:
  filtlong: "docker://quay.io/biocontainers/filtlong:0.3.1--h077b44d_0"
  nanoplot: "docker://quay.io/biocontainers/nanoplot:1.46.2--pyhdfd78af_1"
  flye: "docker://staphb/flye:2.9.2"
  minimap2: "docker://staphb/minimap2:2.26"
  samtools: "docker://staphb/samtools:1.18"
  racon: "docker://staphb/racon:1.5.0"
  medaka: "docker://ontresearch/medaka:latest"
  busco: "docker://ezlabgva/busco:v6.0.0_cv1"
  quast: "docker://quay.io/biocontainers/quast:5.3.0--py313pl5321h5ca1c30_2"
  hifiasm: "docker://quay.io/biocontainers/hifiasm:0.25.0--h5ca1c30_0"
  clair3: "docker://quay.io/biocontainers/clair3:1.2.0--py310h779eee5_0"
  seqkit: "docker://quay.io/biocontainers/seqkit:2.8.2--h9ee0642_0"
  barrnap: "docker://quay.io/biocontainers/barrnap:0.9--hdfd78af_4"
  bcftools: "docker://quay.io/biocontainers/bcftools:1.20--h8b25389_1"
  mosdepth: "docker://quay.io/biocontainers/mosdepth:0.3.13--hba6dcaf_0"
  bedtools: "docker://quay.io/biocontainers/bedtools:2.27.1--h077b44d_9"
  tidk: "docker://quay.io/biocontainers/tidk:0.2.7--h6872113_0"
  merqury: "docker://quay.io/biocontainers/merqury:1.3--hdfd78af_4"
